name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync

      - name: Typecheck
        run: uv run python -m mypy src/

      - name: Lint
        run: uv run python -m ruff check src/ tests/

      - name: Test
        run: uv run python -m pytest

      - name: Coverage gate (domain >= 80%)
        run: uv run pytest --cov=src/domain --cov-report=term-missing --cov-fail-under=80
