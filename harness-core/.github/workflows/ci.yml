name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    # A language pack's ci.yml overwrites this file. This is a minimal fallback for using harness-core without a language pack.
    steps:
      - uses: actions/checkout@v4
      - name: Validate
        run: bash scripts/validate.sh
